# NOTE: This file is retained for Netlify fallback but is NOT active
# when deployed via GitHub Pages. See .github/workflows/deploy.yml
# for the current deployment config.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"

# Security headers (OWASP best practices)
# NOTE: style-src uses 'unsafe-inline' because chart bars, progress bars, and timeline
# segments require dynamic inline styles (computed heights/widths). Removing it would
# break the dashboard UI. Script-src remains strict (no unsafe-inline).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://js.stripe.com https://us-assets.i.posthog.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://yviegtpsklovoyltpnml.supabase.co https://api.stripe.com https://us.i.posthog.com https://prod.spline.design; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-src https://js.stripe.com; worker-src blob: https://unpkg.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache hashed static assets for 1 year (Vite adds content hashes to filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML pages - always revalidate on deploy
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Landing page static JS/CSS (not content-hashed) - cache for 1 hour
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Session detail: /sessions/:id serves detail page; JS parses id from pathname
[[redirects]]
  from = "/sessions/:id"
  to = "/sessions/detail/index.html"
  status = 200

# Branded download redirects → GitHub Releases
[[redirects]]
  from = "/download/macos"
  to = "https://github.com/Morayya-Jain/BrainDock/releases/latest/download/BrainDock-macOS.dmg"
  status = 301

[[redirects]]
  from = "/download/windows"
  to = "https://github.com/Morayya-Jain/BrainDock/releases/latest/download/BrainDock-Setup.exe"
  status = 301
